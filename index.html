<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Abraham Quiz</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(#ffecd2, #fcb69f);
  margin: 0;
  overflow-x: hidden;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 30px 20px;
}

h2, h3 {
  line-height: 1.4;
}

p {
  font-size: 18px;
}

button {
  width: 95%;
  padding: 15px;
  margin: 10px 0;
  font-size: 18px;
  border-radius: 12px;
  border: none;
  background: white;
}

/* Bild */
img {
  max-width: 100%;
  border-radius: 15px;
  margin-top: 20px;
}

/* ❤️ Herzen */
.heart {
  position: fixed;
  color: red;
  font-size: 24px;
  animation: floatUp 4s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* 🎉 Konfetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); }
  100% { transform: translateY(100vh); }
}

/* 🏆 Pokal */
.trophy {
  font-size: 80px;
  animation: pop 1s ease infinite alternate;
}

@keyframes pop {
  from { transform: scale(1); }
  to { transform: scale(1.3); }
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<script>
let step = -1;

const questions = [
["¿Cómo se escribe “conejo” correctamente en alemán?", "Hase", "Hasse", 0],
["¿Cómo se llama el circo nacional de Suiza?", "Gnie", "Knie", 1],
["¿Qué frase está correctamente escrita en alemán?", "Wir faren mit dem Zug nach Bern", "Ich komme leider zu spät", 1],
["¿En qué país está Europa-Park?", "Deutschland", "Frankreich", 0],
["Si aquí son las 20:00, ¿qué hora es en Colombia?", "12:00", "13:00", 1],
["¿Cuántas letras tiene Abraham Stiven Romero Machado?", "27", "26", 1],
["¿Qué línea de autobús va entre Tentlingen y Friburgo?", "123", "129", 1],
["¿Dónde tiene Radio Sense un estudio?", "Murten", "Schwarzsee", 1],
["¿Cuál palabra es igual al leerla al revés?", "Sugus", "Ananass", 0],
["¿Cuántos años tenía Abraham el 4 de febrero de 2024?", "6 años", "5 años", 0]
];

function start() {
document.getElementById("app").innerHTML = `
<h2>Hola Abraham 🎉</h2>
<p>Si quieres podemos ir juntos esta tarde al Luna Park Fribourg.</p>
<p>Pero antes debes resolver este acertijo 😄</p>
<p>Recibirás siempre una pregunta con 2 respuestas. Si aciertas sigues, si fallas vuelves al inicio.</p>
<p>Mamá seguro que puede ayudarte 💖</p>
<button onclick="startQuiz()">Empezar</button>
`;
}

function startQuiz() {
document.getElementById("music").play();
next();
}

function next() {
step++;
if (step >= questions.length) return end();

let q = questions[step];
document.getElementById("app").innerHTML = `
<h3>${q[0]}</h3>
<button onclick="answer(0)">${q[1]}</button>
<button onclick="answer(1)">${q[2]}</button>
`;
}

function answer(i) {
if (i === questions[step][3]) {
next();
} else {
step = -1;
start();
}
}

function startEffects() {
for (let i = 0; i < 20; i++) {
let heart = document.createElement("div");
heart.className = "heart";
heart.style.left = Math.random() * 100 + "vw";
heart.innerHTML = "❤️";
document.body.appendChild(heart);
}

for (let i = 0; i < 40; i++) {
let confetti = document.createElement("div");
confetti.className = "confetti";
confetti.style.left = Math.random() * 100 + "vw";
confetti.style.background = ["red","blue","yellow","green","purple"][Math.floor(Math.random()*5)];
document.body.appendChild(confetti);
}
}

function end() {
startEffects();

document.getElementById("app").innerHTML = `
<div class="trophy">🏆</div>
<h2>¡Felicidades Abraham! 🎉</h2>

<p>¡Ahora ya tienes 8 años y eres un chico grande!</p>

<p>Te quiero muchísimo 💖</p>

<p>Te deseo que hoy te diviertas mucho saltando en el trampolín o disfrutando de otra atracción 🎢</p>

<img src="./abraham.png">
`;
}

start();
</script>

</body>
</html>
